<main class="min-h-screen w-full flex items-center justify-center sm:p-4 font-hand">
  <!-- Mobile container mimicking a piece of paper -->
  <div class="w-full h-screen sm:h-auto sm:min-h-[80vh] max-w-md bg-[#fdfbf7] sm:rounded-md sm:shadow-2xl overflow-hidden relative paper-bg flex flex-col border-l-4 border-l-red-400/60">
    
    <!-- Header -->
    <header class="pt-12 pb-4 px-6">
      <h1 class="text-4xl font-bold text-slate-800 tracking-tight rotate-[-1deg]">Moje Zadania</h1>
    </header>

    <!-- Task List -->
    <ul class="flex-1 px-6 py-2 overflow-y-auto pb-24">
      @for (todo of todos(); track todo.id) {
        <li class="flex items-center gap-4 min-h-[3.5rem] group">
          
          <!-- Game-like Checkbox -->
          <button 
            (click)="toggleTodo(todo.id)" 
            class="w-7 h-7 border-2 border-slate-700 drawn-box flex items-center justify-center relative shrink-0 transition-colors hover:bg-slate-200/50"
            aria-label="Przełącz status zadania">
            @if (todo.completed) {
              <span class="absolute text-4xl font-bold text-slate-800 -top-3 left-0.5 select-none pointer-events-none">X</span>
            }
          </button>

          <!-- Task Text -->
          <span 
            class="text-2xl flex-1 pt-1 transition-all duration-200"
            [class.line-through]="todo.completed"
            [class.text-slate-500]="todo.completed"
            [class.text-slate-800]="!todo.completed"
            (click)="toggleTodo(todo.id)">
            {{todo.text}}
          </span>

          <!-- Delete Button (visible on hover/focus) -->
          <button 
            (click)="deleteTodo(todo.id)"
            class="opacity-0 group-hover:opacity-100 focus:opacity-100 p-2 text-slate-400 hover:text-red-500 transition-opacity"
            aria-label="Usuń zadanie">
            <mat-icon class="text-2xl">delete_outline</mat-icon>
          </button>
        </li>
      }
      
      @if (todos().length === 0) {
        <li class="text-2xl text-slate-400 pt-4 text-center rotate-1">
          Brak zadań. Czas odpocząć!
        </li>
      }
    </ul>

    <!-- Input Area -->
    <div class="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-[#fdfbf7] via-[#fdfbf7] to-transparent">
      <div class="relative flex items-center">
        <input 
          #taskInput 
          (keyup.enter)="addTodo(taskInput)"
          type="text" 
          placeholder="Co musisz zrobić?..." 
          class="w-full bg-transparent border-b-2 border-slate-700 text-2xl px-2 py-2 focus:outline-none focus:border-red-400/60 transition-colors placeholder:text-slate-400"
        >
        <button 
          (click)="addTodo(taskInput)"
          class="absolute right-2 p-2 text-slate-700 hover:text-red-500 transition-colors">
          <mat-icon class="text-3xl">edit</mat-icon>
        </button>
      </div>
    </div>

  </div>
</main>
